  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scheduling Website</title>
  
    <link rel="stylesheet" href="css/home.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/form.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
</style>
</head>
<body>
  <header>
    <nav>
      <a href="#" onclick="showTab('home')">Home</a>
      <a href="#" onclick="showTab('new')">menu</a>
      <a href="#" onclick="showTab('new')">new schedule</a>
    </nav>
  </header>

  <div class="container">
<!-- Home Tab -->
    <div id="home">
      <h2>Welcome to the Scheduling Website</h2>
      <p>Use the menu to create and view schedules.</p>
      <div class="schedule-list" id="scheduleList">
        <h3>Scheduled Events</h3>
        <ul id="events"></ul>
      </div>
    </div>

    <!-- New Schedule Tab -->
    <div id="new" class="hidden">
      <h2>Create a New Schedule</h2>
      <form id="scheduleForm">
        <label for="title">Event Title:</label>
        <input type="text" id="title" required>

<label for="date">Date:</label>
        <input type="date" id="date" required>

        <label for="time">Time:</label>
        <input type="time" id="time" required>

        <button type="submit">Add Schedule</button>
      </form>
    </div>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('home.classList.add('hidden');
      document.getElementById('new').classList.add('hidden');
      document.getElementById(tab).classList.remove('hidden');
    }
const form = document.getElementById('scheduleForm');
    const eventsList = document.getElementById('events');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;

      const li = document.createElement('li');
      li.textContent = `${title} - ${date} at ${time}`;
      eventsList.appendChild(li);
form.reset();
      showTab('home');
    });
  </script>
</body>
</html>
