  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scheduling Website</title>
  
    <link rel="stylesheet" href="css/home.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
  <style>
</style>
</head>
<body>
  <header>
    <nav>
      <a href="#" onclick="showTab('home')">Home</a>
      <a href="#" onclick="showTab('new')">menu</a>
      <a href="#" onclick="showTab('new')">new schedule</a>
      <header class="navbar">
  <div class="logo">MySchedule</div>
  <div class="hamburger" onclick="toggleMenu()"></div>
  <ul class="menu">
    <li><a href="#">Dashboard</a></li>
    <li>
      <a href="#">Classes ▾</a>
      <ul class="submenu">
        <li><a href="#">Math</a></li>
        <li><a href="#">Science</a></li>
        <li><a href="#">History</a></li>
      </ul>
    </li>
    <li><a href="#">Exams</a></li>
    <li><a href="#">Profile</a></li>
  </ul>
</header>
    </nav>
  </header>
  
  <div class="container">
<!-- Home Tab -->
    <div id="home">
      <h2>Welcome to the Scheduling Website</h2>
      <p>Use the menu to create and view schedules.</p>
      <div class="schedule-list" id="scheduleList">
        <h3>Scheduled Events</h3>
        <ul id="events"></ul>
      </div>
    </div>

    <!-- New Schedule Tab -->
    <div class="form-container">
  <h2>Schedule Your Class</h2>
  <form>
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label for="date">Select Date</label>
    <input type="date" id="date">

    <label for="time">Select Time</label>
    <input type="time" id="time">

    <label for="subject">Subject</label>
    <select id="subject">
      <option>Math</option>
      <option>Science</option>
      <option>History</option>
      <option>English</option>
    </select>

    <button type="submit">Book Now</button>
  </form>
</div>


  <script>
    function showTab(tab) {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('new').classList.add('hidden');
      document.getElementById('tab').classList.remove('hidden');
      <button onclick="showTab ('new') ">home </button>
    <button onclick="showTab('home')">nnew schudled</button>  
    }
const scheduleform =document.getElementbyId('scheduleform');
    scheduleform.addeventlistener('submit',function(event){
      event.preventdefault();
      const title=document.getelementbyId('title').value;
      const date=document.getelementbyId('date').value;
       const time=document.getelementbyId('time').value;
      console.log("new event: " ,title, date, time);
      alert ("schedule added: " +title);
      showtab('new schedule');
      scheduleform.reset();
    });

    
  </script>
</body>
</html>
